version: "3.9"

services:
  gateway:
    build: 
      context: ./backend/gateway/ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - identity
      - job

  identity:
    build:
      context: ./backend/services/identity-service
      dockerfile: src/Identity.Api/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      - db

  job:
    build:
      context: ./backend/services/job-service
      dockerfile: src/Job.Api/Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      - db

  app-shell:
    build: 
      context: ./frontend/shell
      dockerfile: Dockerfile
    ports:
      - "4200:80"

  mfe-auth:
    build: 
      context: ./frontend/mfe-auth
      dockerfile: Dockerfile
    ports:
      - "4201:80"

  mfe-jobs:
    build: 
      context: ./frontend/mfe-jobs
      dockerfile: Dockerfile
    ports:
      - "4202:80"

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: peopleops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
