<div class="job-card-premium">
  <div class="card-header">
    <div class="company-logo-placeholder">
      {{ job.companyId.substring(0, 1).toUpperCase() }}
    </div>
    <div class="company-info">
      <span class="company-name">Empresa Parceira</span>
      <span class="posted-date">{{ job.createdAt | date:'shortDate' }}</span>
    </div>
  </div>

  <div class="card-body">
    <h3 class="job-title">{{ job.title }}</h3>
    <div class="job-tags">
      <span class="tag tag-location">
        <i class="icon">📍</i> {{ job.location }}
      </span>
      <span class="tag tag-model">
        <i class="icon">💻</i> {{ job.workModel }}
      </span>
      <span class="tag tag-area">
        {{ job.area }}
      </span>
    </div>
    <p class="job-description">{{ job.description | slice:0:150 }}...</p>
  </div>

  <div class="card-footer">
    <div class="tech-stack">
      <span *ngFor="let tech of job.techStack.split(',')" class="tech-badge">{{ tech.trim() }}</span>
    </div>
    <button class="btn-apply">Ver Detalhes</button>
  </div>
</div>
