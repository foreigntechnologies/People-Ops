<div class="jobs-layout">
  <aside class="sidebar">
    <app-job-filters (filtersChanged)="onFiltersChanged($event)"></app-job-filters>
  </aside>

  <main class="content">
    <section class="hero-section">
      <div class="hero-content">
        <h1>{{ 'JOBS.HERO_TITLE' | translate }}</h1>
        <p class="subtitle">{{ 'JOBS.HERO_SUBTITLE' | translate }}</p>
        <div class="search-hero">
          <input 
            type="text" 
            [placeholder]="'JOBS.SEARCH_PLACEHOLDER' | translate" 
            #searchInput
            (keyup.enter)="onFiltersChanged({search: searchInput.value})"
          >
          <button (click)="onFiltersChanged({search: searchInput.value})">
            {{ 'JOBS.SEARCH_BUTTON' | translate }}
          </button>
        </div>
      </div>
    </section>

    <div class="results-header">
       <h3>{{ 'JOBS.FEATURE_TITLE' | translate }}</h3>
    </div>

    <div *ngIf="isLoading" class="loading-state">
      {{ 'JOBS.LOADING' | translate }}
    </div>

    <div *ngIf="!isLoading && jobs.length === 0" class="empty-state">
      <p>{{ 'JOBS.EMPTY' | translate }}</p>
    </div>

    <div class="jobs-grid" *ngIf="!isLoading && jobs.length > 0">
      <app-job-card *ngFor="let job of jobs" [job]="job"></app-job-card>
    </div>
  </main>
</div>
